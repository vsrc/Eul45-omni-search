name: SignPath Origin Verification Test

on:
  workflow_dispatch:

jobs:
  sign-origin-verified-installer:
    name: Build and Sign x64 NSIS
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build x64 NSIS installer
        run: npx tauri build --bundles nsis

      - name: Locate unsigned NSIS installer
        id: locate-installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer not found."
          }
          "installer_path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload unsigned installer for SignPath
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.locate-installer.outputs.installer_path }}
          archive: false

      - name: Submit signing request to SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: "520bf315-b8ba-44fe-84c1-32c3a40c2f9f"
          project-slug: "omni-search"
          signing-policy-slug: "test-signing"
          artifact-configuration-slug: "nsis-installer"
          github-artifact-id: ${{ steps.upload-unsigned-artifact.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: "${{ github.workspace }}\\signed-artifacts"
          skip-decompress: true

      - name: Upload signed installer
        uses: actions/upload-artifact@v7
        with:
          name: signed-origin-verified-nsis
          path: signed-artifacts
          if-no-files-found: error

      - name: Write SignPath summary
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## SignPath Origin Verification"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Signing request: ${{ steps.signpath.outputs.signing-request-web-url }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Signed artifact download: ${{ steps.signpath.outputs.signed-artifact-download-url }}"
