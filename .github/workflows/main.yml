name: Build Installers

on:
  push:
    paths:
      - 'android/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - '.github/workflows/main.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64
            runner: windows-latest
            arch: x86_64
            args: ''
            bundle-path: src-tauri/target/release/bundle
            artifact-name: installer-x64

          - name: arm64
            runner: windows-11-arm
            arch: aarch64
            args: '--bundles nsis'
            bundle-path: src-tauri/target/release/bundle
            artifact-name: installer-arm64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload MSI Artifact
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-msi
          path: ${{ matrix.bundle-path }}/msi/*.msi

      - name: Upload NSIS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-nsis
          path: ${{ matrix.bundle-path }}/nsis/*.exe

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Disable noisy Java/Kotlin problem matcher
        run: |
          echo "::remove-matcher owner=java::"
          echo "::remove-matcher owner=javac::"
          echo "::remove-matcher owner=kotlin::"
          echo "::remove-matcher owner=java-kotlin::"

      - name: Build preview APK
        working-directory: android
        run: ./gradlew assemblePreview --stacktrace

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/preview/app-preview.apk release-assets/OmniSearch-Android.apk

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnisearch-android-preview-apk
          path: release-assets/OmniSearch-Android.apk
          if-no-files-found: error

  create-draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs:
      - build
      - build-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Get app version
        id: version
        shell: bash
        run: |
          VERSION="$(python -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create draft release with all artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OmniSearch v${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          files: release-assets/*
          fail_on_unmatched_files: false
